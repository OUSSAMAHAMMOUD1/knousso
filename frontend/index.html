<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" id="favicon" type="image/jpeg" href="/images/logo.jpeg.jpeg" />
    <link rel="apple-touch-icon" href="/images/logo.jpeg.jpeg" />
    <script>
      (function() {
        var img = new Image();
        img.onload = function() {
          var c = document.createElement('canvas');
          c.width = c.height = 64;
          var ctx = c.getContext('2d');
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, 64, 64);
          document.getElementById('favicon').href = c.toDataURL('image/png');
        };
        img.src = '/images/logo.jpeg.jpeg';
      })();
    </script>
    <meta name="description" content="KnOusso — Chaussures de luxe pour hommes" />
    <title>KnOusso | Luxury Shoes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
